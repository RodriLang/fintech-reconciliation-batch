spring.application.name=fintech-reconciliation-batch

# ==========================================
# DATABASE SQL (H2)
# ==========================================
#spring.datasource.url=jdbc:h2:mem:fintech_db
# Almacenamiento en un archivo para no perder datos entre ejecuciones
spring.datasource.url=jdbc:h2:file:./data/fintech_db
spring.datasource.username=sa
spring.datasource.password=password
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# DATABASE NOSQL (MONGODB ATLAS)
# ==========================================
spring.mongodb.uri=mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@cluster0.sfkzdiu.mongodb.net/${MONGO_DATABASE}?retryWrites=true&w=majority&appName=Cluster0

# ==========================================
# JPA/Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ==========================================
# 3. SPRING BATCH
# ==========================================
spring.batch.jdbc.initialize-schema=always
spring.batch.job.enabled=false

# ==========================================
# 4. ACTUATOR
# ==========================================
management.endpoints.web.exposure.include=health,metrics

# ==========================================
# APP BATCH CONFIGURATION
# ==========================================
app.batch.reconciliation.input-file-path=classpath:transactions.csv
app.batch.reconciliation.chunkSize=10

# ==========================================
# JOB SCHEDULING
# ==========================================
# Se ejecuta todos los días a las 02:00 AM
app.batch.reconciliation.cron=0 0 2 * * ?

# PARA PRUEBAS ejecución cada 10 segundos
#app.batch.reconciliation.cron=*/10 * * * * ?