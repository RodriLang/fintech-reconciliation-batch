spring.application.name=fintech-reconciliation-batch-test

# ==========================================
# DATABASE SQL (H2 para Tests en Memoria)
# ==========================================
spring.datasource.url=jdbc:h2:mem:fintech_test_db;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ==========================================
# DATABASE NOSQL (MongoDB Local)
# ==========================================
spring.mongodb.uri=mongodb://localhost:27017/fintech_reconciliation_test
logging.level.org.mongodb.driver.cluster=OFF

# ==========================================
# APP BATCH CONFIGURATION FOR TESTS
# ==========================================
app.batch.reconciliation.input-file-path=file:target/transactions_test.csv
app.batch.reconciliation.chunkSize=5
app.batch.reconciliation.cron=0 0 2 * * ?